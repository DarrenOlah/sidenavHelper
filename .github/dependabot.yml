version: 2
updates:
  - package-ecosystem: "npm" #
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      # Bundle low-risk minor + patch bumps into a single PR. Major bumps are
      # left out so they still arrive as individual, reviewable PRs.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
    ignore:
      # Pinned to 6.4.2 to match the live site — see commit 5a370d8.
      - dependency-name: "@fortawesome/fontawesome-free"
